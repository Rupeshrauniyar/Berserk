<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Title (keep under ~60 chars) -->
    <title>Songify – Listen to Music Online Free</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Songify lets you listen to music online for free. Discover songs, stream playlists, and enjoy your favorite music anytime, anywhere."
    />
    <meta
      name="keywords"
      content="Songify, music streaming, listen songs online, free music, playlists, online music player"
    />
    <meta name="author" content="Songify Team" />

    <!-- Canonical -->
    <link rel="canonical" href="https://songifylisten.vercel.app/" />

    <!-- Google Verification -->
    <meta
      name="google-site-verification"
      content="xWX5to9dHEfGfWIhL3Mkb9dZtmWR0SrE9AIQEzW177A"
    />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:title" content="Songify – Listen to Music Online Free" />
    <meta
      property="og:description"
      content="Stream your favorite songs and discover new music with Songify. Free and easy online music player."
    />
    <meta
      property="og:image"
      content="https://songifylisten.vercel.app/og-image.png"
    />
    <meta property="og:url" content="https://songifylisten.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Songify – Listen to Music Online Free"
    />
    <meta
      name="twitter:description"
      content="Enjoy free music streaming with Songify. Listen anytime, anywhere."
    />
    <meta
      name="twitter:image"
      content="https://songifylisten.vercel.app/og-image.png"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <meta name="apple-mobile-web-app-title" content="Songify" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
